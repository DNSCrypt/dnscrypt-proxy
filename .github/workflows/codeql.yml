name: "CodeQL Advanced"

on:
  push:
    branches: [ "Master" ]
  pull_request:
    branches: [ "Master" ]
  schedule:
    - cron: '18 12 * * 4'

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ${{ (matrix.language == 'swift' && 'macos-latest') || 'ubuntu-latest' }}
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: actions
            build-mode: none
          - language: go
            build-mode: manual
          - language: javascript-typescript
            build-mode: none
          - language: python
            build-mode: none

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5       # v6 does not exist
        with:
          submodules: recursive         # Fetches dnscrypt-proxy submodule

      - name: Debug filesystem         # Remove this step once working
        run: |
          echo "--- Repo root ---"
          ls -la
          echo "--- dnscrypt-proxy dir ---"
          ls -la dnscrypt-proxy/ || echo "DIRECTORY MISSING"
          echo "--- go.mod check ---"
          cat dnscrypt-proxy/go.mod || echo "go.mod MISSING"

      - name: Setup Go
        if: matrix.language == 'go'
        uses: actions/setup-go@v5
        with:
          go-version-file: 'dnscrypt-proxy/go.mod'

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      - name: Manual build (Go)
        if: matrix.language == 'go'
        shell: bash
        run: |
          cd dnscrypt-proxy
          go build ./...

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{matrix.language}}"
