name: "CodeQL scan"

permissions:
  actions: read          # Required for CodeQL to read workflow run details
  contents: read
  security-events: write

on:
  push:
  pull_request:
  schedule:
    - cron: '0 14 * * 6'

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Setup Go
      uses: actions/setup-go@v6
      with:
        go-version-file: 'go.mod'
        cache: true      # Enables GOCACHE for faster compilation of vendored projects

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v4
      with:
        languages: go
        build-mode: manual # Required in v4 when utilizing a custom build step below
        queries: security-extended,security-and-quality

    - name: Build
      run: go build -mod=vendor ./...

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v4
      with:
        category: "/language:go"
